databases:
  - name: ljc-accounting-db
    plan: free
    databaseName: ljc_accounting
    user: ljc_accounting_user

services:
  - type: web
    name: ljc-accounting-app
    env: node
    plan: free
    buildCommand: npm install && npm run build:frontend
    startCommand: NODE_ENV=production node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: ljc-accounting-db
          property: connectionString
      - key: ADMIN_EMAIL
        value: jerry@ljcfinancial.com
    routes:
      - path: /
        matchType: prefix
    healthCheckPath: /health

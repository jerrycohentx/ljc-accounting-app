databases:
  - name: ljc-accounting-db
    plan: free
    databaseName: ljc_accounting
    user: ljc_accounting_user

services:
  - type: web
    name: ljc-accounting-app
    runtime: node
    repo: https://github.com/jerrycohentx/ljc-accounting-app
    branch: master
    plan: free
    buildCommand: npm install && npm run build:frontend
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: ljc-accounting-secret-key-2026
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: ljc-accounting-db
          property: connectionString
      - key: ADMIN_EMAIL
        value: jerry@ljcfinancial.com
      - key: ADMIN_PHONE
        value: "+12818317855"
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_FROM_NUMBER
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: "LJC Accounting <onboarding@resend.dev>"
      - key: GRAPH_TENANT_ID
        sync: false
      - key: GRAPH_CLIENT_ID
        sync: false
      - key: GRAPH_CLIENT_SECRET
        sync: false
      - key: GRAPH_MAILBOX_USER
        value: jerry@ljcfinancial.com
      - key: PLAID_CLIENT_ID
        sync: false
      - key: PLAID_SECRET
        sync: false
      - key: PLAID_ENV
        value: sandbox
      - key: PLAID_SIMMONS_INSTITUTION_IDS
        value: ins_111008
      - key: PLAID_WEBHOOK_URL
        sync: false
      - key: LOAN_TRACKER_INTEGRATION_KEY
        value: ljc-cohen-loan-tracker-2026
      - key: LONESTAR_ONLINE_USER
        value: "984900000208"
      - key: LONESTAR_ONLINE_PASSWORD
        sync: false
      - key: LONESTAR_ACCOUNT_LAST4
        value: "7367"
      - key: GMAIL_OAUTH_CLIENT_ID
        sync: false
      - key: GMAIL_OAUTH_CLIENT_SECRET
        sync: false
      - key: GMAIL_OAUTH_REDIRECT_URI
        value: https://ljc-accounting-app.onrender.com/api/email/gmail/callback
      - key: FRONTEND_URL
        value: https://ljc-accounting-app.onrender.com
      - key: DOCUMENT_EMAIL_ENABLED
        value: "1"
      - key: DOCUMENT_EMAIL_INTERVAL_HOURS
        value: "6"
      - key: DOCUMENT_DIGEST_ENABLED
        value: "1"
      - key: DOCUMENT_DIGEST_HOUR
        value: "7"
      - key: DOCUMENT_DIGEST_TO
        value: jerry@ljcfinancial.com
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright-browsers
    healthCheckPath: /health

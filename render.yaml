databases:
  - name: ljc-accounting-db
    plan: free
    databaseName: ljc_accounting
    user: ljc_accounting_user

services:
  - type: web
    name: ljc-accounting-app
    runtime: node
    repo: https://github.com/jerrycohentx/ljc-accounting-app
    branch: master
    plan: free
    buildCommand: npm install && npm run build:frontend
    startCommand: NODE_ENV=production node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: ljc-accounting-secret-key-2026
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: ljc-accounting-db
          property: connectionString
      - key: ADMIN_EMAIL
        value: jerry@ljcfinancial.com
    healthCheckPath: /health
